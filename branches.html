<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="txt-title">فروع تمكين</title>
    <link rel="stylesheet" href="css/branches.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-content container">
            <button onclick="location.href='home.html'" class="btn-icon-back">
                <span class="icon">⬅</span> <span id="txt-back">رجوع</span>
            </button>
            <h2 id="txt-header">دليل فروع تمكين</h2>
            <div class="lang-switch">
                <span onclick="setLanguage('ar')">عربي</span> | 
                <span onclick="setLanguage('en')">EN</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="branchSearch" onkeyup="filterBranches()" placeholder="ابحث باسم الفرع أو المدينة...">
            </div>
            
            <div class="filter-box">
                <select id="branchSelect" onchange="selectBranch()">
                    <option value="" id="opt-default">اختر الفرع من القائمة مباشرة...</option>
                </select>
            </div>
        </div>

        <div id="branchResult" class="result-container" style="display: none;">
            <div class="branch-card-pro">
                <div class="card-sidebar"></div>
                <div class="card-main">
                    <div class="card-top">
                        <h3 id="res-name">اسم الفرع</h3>
                        <span class="badge-status" id="txt-active">نشط</span>
                    </div>
                    
                    <div class="card-details">
                        <div class="detail-row">
                            <span class="detail-icon">📍</span>
                            <div class="detail-text">
                                <label id="lbl-address">العنوان</label>
                                <p id="res-address">...</p>
                            </div>
                        </div>
                        <div class="detail-row">
                            <span class="detail-icon">📞</span>
                            <div class="detail-text">
                                <label id="lbl-phone">رقم التواصل</label>
                                <p id="res-phone">...</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-actions">
                        <a id="res-map-link" href="#" target="_blank" class="btn-map">
                            <span id="txt-view-map">فتح في خرائط Google</span>
                        </a>
                        <button onclick="copyLocation()" class="btn-copy" id="btn-copy">
                            <span id="txt-copy">نسخ البيانات</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">
            <h4 id="txt-all-branches">جميع الفروع</h4>
            <div class="line"></div>
        </div>
        <div id="allBranchesList" class="branches-pro-grid">
            <p id="loading-msg">جاري تحميل الفروع...</p>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/lang-manager.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/branches.js"></script>
</body>
</html>
