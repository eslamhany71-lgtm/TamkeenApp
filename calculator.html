<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة القروض - تمكين ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
    <div class="page-container">
        <div class="calc-panel">
            <div class="panel-header">
                <div class="header-icon">🧮</div>
                <div>
                    <h2 id="txt-calc-title">حاسبة القروض والتمويل</h2>
                    <p id="txt-calc-sub">قم بإدخال بيانات القرض لحساب القسط الشهري والفوائد</p>
                </div>
            </div>

            <div class="calc-body">
                <div class="input-group">
                    <label id="lbl-amount">مبلغ القرض</label>
                    <input type="number" id="loan-amount" placeholder="مثال: 50000">
                </div>
                <div class="input-group">
                    <label id="lbl-interest">نسبة الفائدة السنوية (%)</label>
                    <input type="number" id="loan-interest" placeholder="مثال: 12">
                </div>
                <div class="input-group">
                    <label id="lbl-months">مدة السداد (بالأشهر)</label>
                    <input type="number" id="loan-months" placeholder="مثال: 36">
                </div>

                <button class="btn-calculate" id="btn-calc" onclick="calculateLoan()">احسب الآن</button>
            </div>

            <div class="result-box" id="result-box" style="display: none;">
                <h3 id="txt-result-title">نتيجة الحساب</h3>
                <div class="result-grid">
                    <div class="res-item">
                        <span id="lbl-res-monthly">القسط الشهري</span>
                        <strong id="res-monthly" class="text-primary">0</strong>
                    </div>
                    <div class="res-item">
                        <span id="lbl-res-total-interest">إجمالي الفوائد</span>
                        <strong id="res-total-interest" class="text-warning">0</strong>
                    </div>
                    <div class="res-item">
                        <span id="lbl-res-total">الإجمالي الكلي (شامل الفوائد)</span>
                        <strong id="res-total" class="text-success">0</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/calculator.js"></script>
</body>
</html>
