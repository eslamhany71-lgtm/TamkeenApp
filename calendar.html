<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" href="css/calendar.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="calendar-wrapper">
        <div class="page-header">
            <div class="page-title">
                <h1 id="txt-title">أجندة المواعيد</h1>
                <p id="txt-subtitle">إدارة حجوزات العيادة وتنظيم وقت الطبيب</p>
            </div>
            <div class="header-actions">
                <button class="btn-add" onclick="openAppointmentModal()">
                    <span>🗓️</span> <span id="btn-add-txt">حجز موعد جديد</span>
                </button>
            </div>
        </div>

        <div class="calendar-container">
            <div id='calendar'></div>
        </div>
    </div>

    <div id="appointmentModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAppModal()">&times;</span>
        <h2 id="modal-title">حجز موعد جديد</h2>
        
        <form id="appForm" onsubmit="saveAppointment(event)">
            <div class="form-group">
                <label>اسم المريض</label>
                <input type="text" id="app_patient_name" required list="patientsList">
                <datalist id="patientsList"></datalist> 
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>التاريخ</label>
                    <input type="date" id="app_date" required>
                </div>
                <div class="form-group">
                    <label>الوقت</label>
                    <input type="time" id="app_time" required>
                </div>
            </div>

            <div class="form-group">
                <label>نوع الإجراء</label>
                <select id="app_type">
                    <option value="كشف جديد">كشف جديد</option>
                    <option value="استشارة">استشارة</option>
                    <option value="حشو">حشو</option>
                    <option value="تنظيف جير">تنظيف جير</option>
                    <option value="تقويم">تقويم</option>
                    <option value="خلع">خلع</option>
                </select>
            </div>

            <div class="form-group">
                <label>ملاحظات</label>
                <textarea id="app_notes" rows="2" style="width:100%; border-radius:8px; border:1px solid #cbd5e1; padding:8px; font-family:inherit;"></textarea>
            </div>

            <div id="edit-actions" style="display:none; gap:10px; margin-bottom:10px;">
                <button type="button" class="btn-danger" onclick="deleteAppointment()" style="flex:1; padding:10px;">🗑️ حذف الموعد</button>
            </div>

            <button type="submit" id="btn-save-app" class="btn-primary" style="width:100%; padding:12px;">حفظ الموعد</button>
        </form>
    </div>
</div>

    <div id="appDetailsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAppDetailsModal()">&times;</span>
            <h2 style="margin-top: 0; margin-bottom: 20px; color: #0f172a;">تفاصيل الحجز</h2>
            
            <div class="details-box" style="background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong>👤 اسم المريض:</strong> <span id="det_name" style="color: #0284C7; font-weight: bold;"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong>📅 التاريخ:</strong> <span id="det_date"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong>⏰ الساعة:</strong> <span id="det_time"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong>🩺 نوع الكشف:</strong> <span id="det_type"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong>📝 ملاحظات:</strong> <span id="det_notes"></span></p>
                <p style="margin: 0; font-size: 16px;"><strong>📌 الحالة:</strong> <span id="det_status" style="background: #fef08a; padding: 2px 8px; border-radius: 6px; color: #854d0e; font-size: 14px;"></span></p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
