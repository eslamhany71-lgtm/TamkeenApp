<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" href="css/calendar.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        /* ستايلات حقول الحسابات */
        .finance-box-modal { display: flex; gap: 10px; background: #f0fdf4; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #bbf7d0; flex-wrap: wrap;}
        .finance-box-modal .form-group { flex: 1; min-width: 100px; margin-bottom: 0; }
        .finance-box-modal input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px; text-align: center; font-weight: bold;}
        .finance-box-modal input[readonly] { background: #e2e8f0; color: #ef4444; }
        
        /* ستايل المربعات الطبية */
        .med-history-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #d97706;}

    </style>
</head>
<body>

    <div class="calendar-wrapper">
        <div class="page-header">
            <div class="page-title">
                <h1 id="txt-title">أجندة المواعيد</h1>
                <p id="txt-subtitle">إدارة حجوزات العيادة وتنظيم وقت الطبيب</p>
            </div>
            <div class="header-actions">
                <button class="btn-add" onclick="openAppointmentModal()">
                    <span>🗓️</span> <span id="btn-add-txt">حجز موعد جديد</span>
                </button>
            </div>
        </div>

        <div class="calendar-container">
            <div id='calendar'></div>
        </div>
    </div>

    <div id="appointmentModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px; max-height: 85vh; overflow-y: auto; overflow-x: hidden;">
            <span class="close-modal" onclick="closeAppointmentModal()">&times;</span>
            <h2 id="modal-title" style="margin-top: 0; margin-bottom: 20px;">حجز موعد جديد</h2>
            
            <form id="addAppointmentForm" onsubmit="saveAppointment(event)">
                
                <div class="smart-search-box" id="smart-search-container">
                    <label id="lbl-search-patient" style="font-weight: bold; color: #0284c7; display: block; margin-bottom: 5px;">🔍 بحث عن مريض مسجل (اختياري)</label>
                    <input type="text" id="search_patient_input" class="search-box" placeholder="اكتب الاسم أو رقم الموبايل للبحث..." oninput="searchExistingPatients()" autocomplete="off">
                    <div id="patient-search-results" class="patient-results-dropdown"></div>
                </div>

                <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <h3 style="margin-top: 0; font-size: 16px; color: #0f172a;">بيانات المريض</h3>
                    
                    <div class="form-group">
                        <label id="lbl-app-name">اسم المريض</label>
                        <input type="text" id="app_name" placeholder="الاسم ثلاثي" required>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label id="lbl-app-phone">رقم الموبايل</label>
                            <input type="tel" id="app_phone" placeholder="01xxxxxxxxx" required dir="ltr" style="text-align: left;">
                        </div>
                        <div class="form-group">
                            <label id="lbl-app-age">العمر (سنوات)</label>
                            <input type="number" id="app_age" placeholder="مثال: 35" required min="1" max="120">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                        <div class="form-group">
                            <label id="lbl-app-gender">النوع</label>
                            <select id="app_gender" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1;">
                                <option value="ذكر">ذكر</option>
                                <option value="أنثى">أنثى</option>
                            </select>
                        </div>
                    </div>

                    <div style="grid-column: 1 / -1; background: #fffbeb; padding: 15px; border-radius: 8px; border: 1px dashed #fcd34d; margin-top: 10px;">
                        <label id="lbl-app-history-title" style="font-weight: bold; color: #d97706; margin-bottom: 10px; display: block;">التاريخ الطبي وأمراض مزمنة (اختياري)</label>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; color: #0f172a; font-weight: 500;">
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="قلب"> قلب</label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="غدة"> غدة</label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="سكر"> سكر</label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="ضغط"> ضغط</label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="حمل"> حمل</label>
                        </div>
                        <input type="text" id="app_history" placeholder="ملاحظات طبية أخرى (اكتب هنا إن وجد)..." style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit;">
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label id="lbl-app-date">تاريخ الموعد</label>
                        <input type="date" id="app_date" required>
                    </div>
                    <div class="form-group">
                        <label id="lbl-app-time">الساعة</label>
                        <input type="time" id="app_time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lbl-app-type">نوع الكشف / الجلسة</label>
                    <input type="text" id="app_type" placeholder="مثال: كشف جديد، حشو عصب..." required>
                </div>

                <div class="finance-box-modal">
                    <div class="form-group">
                        <label id="lbl-app-total" style="font-size: 13px;">الإجمالي</label>
                        <input type="number" id="app_total" value="0" required oninput="calcCalRemaining()">
                    </div>
                    <div class="form-group">
                        <label id="lbl-app-paid" style="font-size: 13px;">المدفوع</label>
                        <input type="number" id="app_paid" value="0" required oninput="calcCalRemaining()">
                    </div>
                    <div class="form-group">
                        <label id="lbl-app-rem" style="font-size: 13px;">المتبقي</label>
                        <input type="number" id="app_remaining" value="0" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lbl-app-notes">ملاحظات الحجز (اختياري)</label>
                    <input type="text" id="app_notes" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                </div>

                <button type="submit" id="btn-save" class="btn-add" style="width: 100%; justify-content: center; margin-top: 10px; padding: 12px; font-size: 16px;">
                    تأكيد الحجز
                </button>
            </form>
        </div>
    </div>

    <div id="appDetailsModal" class="modal" style="display: none; z-index: 1005;">
        <div class="modal-content" style="max-height: 85vh; overflow-y: auto; overflow-x: hidden;">
            <span class="close-modal" onclick="closeAppDetailsModal()">&times;</span>
            <h2 id="det-modal-title" style="margin-top: 0; margin-bottom: 20px; color: #0f172a;">تفاصيل الحجز</h2>
            
            <div class="details-box" style="background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px;">
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-name">👤 اسم المريض:</strong> <span id="det_name" style="color: #0284C7; font-weight: bold;"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-phone">📱 الموبايل:</strong> <span id="det_phone" dir="ltr" style="display:inline-block;"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-date">📅 التاريخ:</strong> <span id="det_date"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-time">⏰ الساعة:</strong> <span id="det_time"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-type">🩺 نوع الكشف:</strong> <span id="det_type"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-history">📋 التاريخ الطبي:</strong> <span id="det_history" style="color: #d97706; font-weight: bold;"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-finance">💰 الحساب (مدفوع / إجمالي):</strong> <span id="det_finance" style="color: #10b981; font-weight: bold;"></span></p>
                <p style="margin: 0 0 10px 0; font-size: 16px;"><strong class="lbl-det-notes">📝 ملاحظات:</strong> <span id="det_notes"></span></p>
                <p style="margin: 0; font-size: 16px;"><strong class="lbl-det-status">📌 الحالة:</strong> <span id="det_status" style="background: #fef08a; padding: 2px 8px; border-radius: 6px; color: #854d0e; font-size: 14px;"></span></p>
            </div>

            <div id="whatsapp-action-box" style="margin-bottom: 10px;">
                <button class="btn-success" id="btn-wa-reminder" style="width: 100%; padding: 12px; font-size: 16px; justify-content: center; background: #25D366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;" onclick="sendWhatsAppReminder()">📱 إرسال تذكير بالموعد (واتساب)</button>
            </div>

            <div id="complete-action-box" style="margin-bottom: 10px;">
                <button class="btn-success" id="btn-complete-app" style="width: 100%; padding: 12px; font-size: 16px; justify-content: center; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;" onclick="markAppAsCompleted()">✅ المريض حضر (اكتمال الحجز وتوريد الإيراد)</button>
            </div>

            <div id="edit-action-box" style="margin-bottom: 10px;">
                <button class="btn-action-primary" id="btn-edit-app" onclick="openEditModal()" style="width: 100%; padding: 10px; background: #0284C7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">✏️ تعديل الحجز</button>
            </div>

            <div id="cancel-action-box" style="margin-bottom: 10px;">
                <button class="btn-warning" id="btn-cancel-app" onclick="cancelAppointment()" style="width: 100%; padding: 10px; background: #f97316; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">🚫 إلغاء الحجز (بدون مسح)</button>
            </div>

            <div id="restore-action-box" style="margin-bottom: 10px; display: none;">
                <button class="btn-success" id="btn-restore-app" onclick="restoreAppointment()" style="width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">🔄 إرجاع الحجز لقيد الانتظار</button>
            </div>

            <div id="delete-action-box">
                <button class="btn-action-danger" id="btn-delete-app" onclick="deleteAppointment()" style="width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">🗑️ حذف الحجز نهائياً</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/lang-manager.js" onerror="console.log('No lang manager found, using fallback.')"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
