<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="txt-title">إدارة المبيعات والعملاء (CRM)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/crm.css">   
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <main class="page-container">
        
        <div class="page-header-pro">
            <div>
                <h2 id="txt-header">مسار المبيعات (Sales Pipeline)</h2>
                <p id="txt-subtitle">إدارة العملاء وتتبع مراحل المبيعات والصفقات</p>
            </div>
            <div class="header-actions">
                <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" style="display:none" onchange="uploadExcel(event)">
                <button onclick="document.getElementById('excelUpload').click()" class="btn-import-excel" id="btn-import-excel">📊 رفع شيت إكسيل</button>
                <button onclick="openLeadModal()" class="btn-add-lead" id="btn-add-lead">➕ إضافة عميل جديد</button>
            </div>
        </div>

        <div class="crm-stats">
            <div class="stat-box"><span id="lbl-total-leads">إجمالي العملاء:</span> <strong id="val-total">0</strong></div>
            <div class="stat-box"><span id="lbl-won-leads">تم البيع (Won):</span> <strong id="val-won" style="color:#10b981;">0</strong></div>
            <div class="stat-box"><span id="lbl-lost-leads">مرفوض (Lost):</span> <strong id="val-lost" style="color:#ef4444;">0</strong></div>
        </div>

        <div id="bulk-actions" class="bulk-actions" style="display: none;">
            <span id="txt-selected-count">تم تحديد: <strong id="selected-count">0</strong></span>
            <button onclick="deleteSelectedLeads()" class="btn-danger" id="btn-bulk-delete">🗑️ حذف المحدد</button>
        </div>

        <div class="kanban-board">
            <div class="kanban-column" id="col-new" ondrop="drop(event, 'new')" ondragover="allowDrop(event)">
                <div class="col-header border-blue">
                    <h3 id="txt-col-new">عميل جديد (New)</h3>
                    <span class="col-count" id="count-new">0</span>
                </div>
                <div class="col-body" id="body-new"></div>
            </div>

            <div class="kanban-column" id="col-contacted" ondrop="drop(event, 'contacted')" ondragover="allowDrop(event)">
                <div class="col-header border-orange">
                    <h3 id="txt-col-contacted">جاري التواصل</h3>
                    <span class="col-count" id="count-contacted">0</span>
                </div>
                <div class="col-body" id="body-contacted"></div>
            </div>

            <div class="kanban-column" id="col-negotiation" ondrop="drop(event, 'negotiation')" ondragover="allowDrop(event)">
                <div class="col-header border-purple">
                    <h3 id="txt-col-negotiation">تفاوض / عرض سعر</h3>
                    <span class="col-count" id="count-negotiation">0</span>
                </div>
                <div class="col-body" id="body-negotiation"></div>
            </div>

            <div class="kanban-column" id="col-won" ondrop="drop(event, 'won')" ondragover="allowDrop(event)">
                <div class="col-header border-green">
                    <h3 id="txt-col-won">تم البيع (Won)</h3>
                    <span class="col-count" id="count-won">0</span>
                </div>
                <div class="col-body" id="body-won"></div>
            </div>

            <div class="kanban-column" id="col-lost" ondrop="drop(event, 'lost')" ondragover="allowDrop(event)">
                <div class="col-header border-red">
                    <h3 id="txt-col-lost">مرفوض (Lost)</h3>
                    <span class="col-count" id="count-lost">0</span>
                </div>
                <div class="col-body" id="body-lost"></div>
            </div>
        </div>
    </main>

    <div id="leadModal" class="modal">
        <div class="modal-content animate-top">
            <div class="modal-header-pro">
                <h2 id="modal-lead-title">إضافة عميل جديد</h2>
                <span class="close-btn" onclick="closeLeadModal()">&times;</span>
            </div>
            <div class="modal-body-pro" style="padding: 20px;">
                <form id="leadForm" onsubmit="saveLead(event)">
                    <input type="hidden" id="leadId">
                    <div class="input-group">
                        <label id="lbl-lead-name">اسم العميل / الشركة</label>
                        <input type="text" id="leadName" required class="form-control">
                                        </div>
                    <div class="input-group">
                        <label id="lbl-lead-phone">رقم الهاتف الأساسي</label>
                        <input type="text" id="leadPhone" required class="form-control" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    
                    <div class="input-group">
                        <label id="lbl-lead-phone2">رقم هاتف إضافي (اختياري)</label>
                        <input type="text" id="leadPhone2" class="form-control" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                                        <div class="input-group">
                        <label id="lbl-lead-value">قيمة الصفقة المتوقعة</label>
                        <input type="number" id="leadValue" class="form-control" placeholder="مثال: 50000">
                    </div>
                    <div class="input-group">
                        <label id="lbl-lead-priority">الأولوية</label>
                        <select id="leadPriority" class="form-control">
                            <option value="high" id="opt-high">🔥 عالية (ساخن)</option>
                            <option value="medium" id="opt-medium">⚡ متوسطة</option>
                            <option value="low" id="opt-low">❄️ منخفضة (بارد)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label id="lbl-lead-note">ملاحظات أولية</label>
                        <textarea id="leadNote" rows="2" class="form-control"></textarea>
                    </div>
                    <button type="submit" class="btn-submit-lead" id="btn-save-lead">حفظ بيانات العميل</button>
                </form>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content animate-top" style="max-width: 400px;">
            <div class="modal-header-pro">
                <h2 id="modal-feedback-title">تحديث حالة العميل</h2>
                <span class="close-btn" onclick="closeFeedbackModal()">&times;</span>
            </div>
            <div class="modal-body-pro" style="padding: 20px;">
                <form id="feedbackForm" onsubmit="saveFeedback(event)">
                    <input type="hidden" id="feedbackLeadId">
                    <div class="input-group">
                        <label id="lbl-feedback">التعليق / الفيدباك</label>
                        <textarea id="leadFeedback" rows="4" class="form-control" placeholder="ماذا حدث مع العميل؟" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit-lead" style="background: #3b82f6;" id="btn-save-feedback">حفظ التعليق</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/crm.js"></script>
</body>
</html>
