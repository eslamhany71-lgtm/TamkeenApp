<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="txt-title">الرئيسية - NivaDent</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand" id="clinic-brand-area" style="padding: 20px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">
                <div id="clinic-logo-container" style="margin-bottom: 10px; display: flex; justify-content: center;">
                    <svg width="45" height="45" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="20" fill="#E0F2FE"/>
                        <path d="M30 40C30 28.9543 38.9543 20 50 20C61.0457 20 70 28.9543 70 40V60C70 65.5228 65.5228 70 60 70C54.4772 70 50 65.5228 50 60C50 65.5228 45.5228 70 40 70C34.4772 70 30 65.5228 30 60V40Z" fill="#0284C7"/>
                        <path d="M50 20C38.9543 20 30 28.9543 30 40V60C30 65.5228 34.4772 70 40 70C45.5228 70 50 65.5228 50 60V20Z" fill="#0EA5E9"/>
                        <circle cx="50" cy="50" r="8" fill="#FFFFFF"/>
                    </svg>
                </div>
                <span id="txt-clinic-name" style="font-size: 18px; font-weight: 800; color: #fff; display: block;">NivaDent System</span>
            </div>

            <ul class="nav-links" id="nav-links">
                <li class="active" onclick="loadPage('dashboard.html', this)">
                    <a href="javascript:void(0)"><span class="icon">📊</span> <span id="nav-dash">الداشبورد</span></a>
                </li>
                
                <li onclick="loadPage('patients.html', this)">
                    <a href="javascript:void(0)"><span class="icon">🩻</span> <span id="nav-patients">المرضى والأشعة</span></a>
                </li>
                
                <li onclick="loadPage('calendar.html', this)">
                    <a href="javascript:void(0)"><span class="icon">📅</span> <span id="nav-calendar">المواعيد والتقويم</span></a>
                </li>
                
                <li onclick="loadPage('sessions.html', this)">
                    <a href="javascript:void(0)"><span class="icon">💊</span> <span id="nav-sessions">الجلسات والروشتات</span></a>
                </li>
                
                <li onclick="loadPage('finances.html', this)">
                    <a href="javascript:void(0)"><span class="icon">💸</span> <span id="nav-finances">الحسابات والمصروفات</span></a>
                </li>
                
                <li id="nav-settings-li" onclick="loadPage('settings.html', this)" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                    <a href="javascript:void(0)"><span class="icon">⚙️</span> <span id="nav-settings">إعدادات العيادة</span></a>
                </li>
                
                <li id="nav-super-admin" style="display: none;" onclick="loadPage('super-admin.html', this)">
                    <a href="javascript:void(0)"><span class="icon">👑</span> <span id="nav-super">إدارة النظام المركزية</span></a>
                </li>
            </ul>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="topbar-right">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <button class="desktop-toggle" onclick="toggleSidebarDesktop()">🗜️</button>
                    <h2 id="txt-header">لوحة التحكم</h2>
                </div>
                <div class="topbar-left user-controls">
                    <div class="lang-switch">
                        <span onclick="switchAppLanguage('ar')" class="lang-btn">عربي</span> | 
                        <span onclick="switchAppLanguage('en')" class="lang-btn">EN</span>
                    </div>
                    <div class="user-profile">
                        <span class="user-avatar" style="background: #E0F2FE; color: #0284C7; border-radius: 50%; padding: 5px 8px;">👨‍⚕️</span>
                        <span id="userEmail" class="user-email" style="font-weight: bold; color: #0F172A;">...</span>
                    </div>
                    <button onclick="logout()" class="logout-btn" id="btn-logout" style="background: #EF4444;">خروج</button>
                </div>
            </header>

            <iframe id="content-frame" class="content-frame" src="dashboard.html"></iframe>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/lang-manager.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
