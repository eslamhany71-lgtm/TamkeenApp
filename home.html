<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="txt-title">الرئيسية - تمكين</title>
    <link rel="stylesheet" href="css/home.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="user-controls">
            <button onclick="logout()" class="logout-btn" id="btn-logout">تسجيل خروج</button>
            <div class="lang-switch">
                <span onclick="setLanguage('ar')" style="cursor:pointer; font-weight:bold; padding:5px;">عربي</span> | 
                <span onclick="setLanguage('en')" style="cursor:pointer; font-weight:bold; padding:5px;">EN</span>
            </div>
        </div>
        <h2 id="txt-header">لوحة التحكم</h2>
    </header>

    <main class="container">
        <div class="welcome-section">
            <h1 id="txt-welcome">جاري التحميل...</h1>
            <p id="userEmail" style="color: #2a5298; font-weight: bold;"></p>
        </div>

        <div class="cards-grid">
            <div class="card" onclick="location.href='calculator.html'">
                <div class="icon">💰</div>
                <h3 id="txt-calc">حاسبة القروض</h3>
            </div>
            <div class="card" onclick="location.href='hr-solution.html'">
                <div class="icon">📝</div>
                <h3 id="txt-hr">شؤون الموظفين</h3>
            </div>
            <div class="card" onclick="location.href='branches.html'">
                <div class="icon">📍</div>
                <h3 id="txt-branches">الفروع</h3>
            </div>

            <div id="manager-card" class="card" style="display: none; border: 2px solid #27ae60;" onclick="location.href='manager-dashboard.html'">
                <div class="icon">📊</div>
                <h3 id="txt-mgr-dash">لوحة تحكم المدير</h3>
            </div>

            <div id="hr-admin-card" class="card" style="display: none; border: 2px solid #e67e22;" onclick="location.href='hr-dashboard.html'">
                <div class="icon">🏢</div>
                <h3 id="txt-hr-dash">لوحة تحكم الـ HR</h3>
            </div>

            <div id="admin-branch-card" class="card" style="display: none; border: 2px solid #9b59b6;" onclick="location.href='admin-branches.html'">
                <div class="icon">⚙️</div>
                <h3 id="txt-admin-dash">إدارة الفروع (Admin)</h3>
            </div>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/lang-manager.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
