<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="txt-title">الرئيسية - تمكين ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">⚡</span>
                <span id="txt-brand">تمكين ERP</span>
            </div>
            <ul class="nav-links" id="nav-links">
                <li class="active" onclick="loadPage('dashboard.html', this)"><a href="javascript:void(0)"><span class="icon">🏠</span> <span id="nav-home">الرئيسية</span></a></li>
                <li onclick="loadPage('crm.html', this)"><a href="javascript:void(0)"><span class="icon">🤝</span> <span id="nav-crm">إدارة العملاء (CRM)</span></a></li>
                <li onclick="loadPage('calculator.html', this)"><a href="javascript:void(0)"><span class="icon">💰</span> <span id="nav-calc">حاسبة القروض</span></a></li>
                <li onclick="loadPage('hr-solution.html', this)"><a href="javascript:void(0)"><span class="icon">📝</span> <span id="nav-hr">الخدمات الذاتية</span></a></li>
                <li onclick="loadPage('branches.html', this)"><a href="javascript:void(0)"><span class="icon">📍</span> <span id="nav-branches">دليل الفروع</span></a></li>
                
                <li id="nav-manager" style="display: none;" onclick="loadPage('manager-dashboard.html', this)"><a href="javascript:void(0)"><span class="icon">📊</span> <span id="nav-mgr-dash">لوحة المدير</span></a></li>
                <li id="nav-hr-admin" style="display: none;" onclick="loadPage('hr-dashboard.html', this)"><a href="javascript:void(0)"><span class="icon">🏢</span> <span id="nav-hrd-dash">لوحة الـ HR</span></a></li>
                <li id="nav-admin" style="display: none;" onclick="loadPage('admin-branches.html', this)"><a href="javascript:void(0)"><span class="icon">⚙️</span> <span id="nav-adm-dash">إدارة النظام</span></a></li>
            </ul>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="topbar-right">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <button class="desktop-toggle" onclick="toggleSidebarDesktop()">🗜️</button>
                    <h2 id="txt-header">لوحة التحكم المركزية</h2>
                </div>
                <div class="topbar-left user-controls">
                    <div class="lang-switch">
                        <span onclick="switchAppLanguage('ar')" class="lang-btn">عربي</span> | 
                        <span onclick="switchAppLanguage('en')" class="lang-btn">EN</span>
                    </div>
                    <div class="user-profile">
                        <span class="user-avatar">👤</span>
                        <span id="userEmail" class="user-email">...</span>
                    </div>
                    <button onclick="logout()" class="logout-btn" id="btn-logout">خروج</button>
                </div>
            </header>

            <iframe id="content-frame" class="content-frame" src="dashboard.html"></iframe>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/lang-manager.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
