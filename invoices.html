<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>نظام الفواتير والتحصيل | NivaDent Invoices</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        var currentHour = Math.floor(Date.now() / 3600000);
        document.write('<link rel="stylesheet" href="css/patient-profile.css?v=' + currentHour + '">'); 
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        .invoice-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-top: 20px; align-items: start; }
        .search-sidebar { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; position: sticky; top: 20px; }
        .invoice-display { background: white; padding: 40px; border-radius: 16px; border: 1px solid #e2e8f0; min-height: 600px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        
        .patient-result-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; border-radius: 8px; }
        .patient-result-item:hover { background: #f0f9ff; color: #0284c7; }
        .patient-result-item.active { background: #0284c7; color: white; }

        @media (max-width: 900px) {
            .invoice-wrapper { grid-template-columns: 1fr; }
            .search-sidebar { position: static; }
        }

        .bill-header { display: flex; justify-content: space-between; border-bottom: 3px solid #0f172a; padding-bottom: 20px; margin-bottom: 30px; }
        .bill-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .bill-table th { background: #f8fafc; padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        .bill-table td { padding: 12px; border: 1px solid #e2e8f0; }
        .bill-footer { margin-top: 30px; display: flex; justify-content: flex-end; }
        .total-box { background: #0f172a; color: white; padding: 20px; border-radius: 12px; min-width: 250px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        
        [data-theme="dark"] .search-sidebar, [data-theme="dark"] .invoice-display { background: #1e293b !important; border-color: #334155 !important; }
        [data-theme="dark"] .bill-table th { background: #0f172a !important; color: #f8fafc !important; }
        [data-theme="dark"] td { color: #cbd5e1 !important; }

        /* 🔴 تظبيط الطباعة لورقة A4 🔴 */
        @page {
            size: A4;
            margin: 15mm; 
        }
        @media print {
            body { margin: 0; padding: 0; background: white !important; font-family: 'Tajawal', sans-serif; }
            .no-print { display: none !important; }
            .print-only { display: block !important; width: 100%; }
            
            #actualPrintArea {
                width: 100%;
                color: #000;
                font-size: 14pt;
            }

            .bill-header { display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
            .bill-header h1 { font-size: 24pt; margin: 0; color: #000 !important; }
            .bill-header p { color: #000 !important; }
            
            div[style*="background: #f8fafc"] { background: white !important; border: 2px solid #000 !important; }
            h2, span { color: #000 !important; }

            .bill-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12pt; }
            .bill-table th { background: #f1f5f9 !important; padding: 10px; border: 1px solid #000; text-align: right; color: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
            .bill-table td { padding: 10px; border: 1px solid #000; color: #000 !important; }
            
            .bill-footer { margin-top: 30px; display: flex; justify-content: flex-end; }
            .total-box { background: #f8fafc !important; color: #000 !important; padding: 15px; border-radius: 8px; border: 2px solid #000; min-width: 250px; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
            .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14pt; font-weight: bold; }
            .total-row span { color: #000 !important; }
        }
    </style>
</head>
<body>

    <div class="page-header no-print">
        <div class="page-title">
            <h1>الفواتير وكشوف الحساب</h1>
            <p>إصدار الفواتير الرسمية، مراجعة مديونيات المرضى، وطباعة السندات</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary" onclick="window.print()">
                <span>🖨️</span> <span>طباعة الفاتورة الحالية</span>
            </button>
        </div>
    </div>

    <div class="invoice-wrapper no-print">
        <!-- الجانب الأيمن: البحث واختيار المريض -->
        <div class="search-sidebar">
            <h3 style="margin-top: 0;">🔍 ابحث عن مريض</h3>
            <input type="text" id="patientSearch" class="search-box" placeholder="اسم المريض أو الموبايل..." oninput="searchPatientsForInvoice()">
            
            <div id="searchResults" style="margin-top: 15px; max-height: 400px; overflow-y: auto;">
                <div class="empty-state" style="font-size: 13px;">ابدأ البحث لعرض المرضى...</div>
            </div>
        </div>

        <!-- الجانب الأيسر: عرض الفاتورة -->
        <div class="invoice-display" id="printableInvoice">
            <div id="invoicePlaceholder" style="text-align: center; padding: 100px 20px; color: #94a3b8;">
                <span style="font-size: 60px;">📄</span>
                <h2>اختر مريضاً من القائمة لعرض كشف الحساب</h2>
                <p>سيتم تجميع كافة الجلسات والمدفوعات والديون تلقائياً</p>
            </div>

            <div id="invoiceContent" style="display: none;">
                <!-- محتوى الفاتورة سيُحقن هنا -->
            </div>
        </div>
    </div>

    <!-- 🔴 نسخة الطباعة الرسمية A4 🔴 -->
    <div class="print-only" id="actualPrintArea"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/invoices.js"></script>
</body>
</html>
