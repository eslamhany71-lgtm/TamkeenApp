<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title id="page_title">الإشعارات | NivaDent Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        var currentHour = Math.floor(Date.now() / 3600000);
        document.write('<link rel="stylesheet" href="css/finances.css?v=' + currentHour + '">'); 
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <style>
        /* 🌟 حركات وأنيميشن الإشعارات 🌟 */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.9); margin-top: -100px; padding: 0; height: 0; overflow: hidden; border: none; }
        }
        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .notif-container { max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 15px; }
        
        .notif-card {
            background: white; border-radius: 16px; padding: 20px; display: flex; gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            position: relative; overflow: hidden; transition: 0.3s ease;
            animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .notif-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .notif-card.removing { animation: fadeOut 0.4s ease forwards; pointer-events: none; }
        
        .notif-card.unread { border-right: 4px solid #ef4444; background: #fef2f2; }
        .notif-card.unread::before {
            content: ''; position: absolute; top: 20px; right: 20px; width: 10px; height: 10px;
            background: #ef4444; border-radius: 50%; animation: pulseDot 2s infinite;
        }

        .notif-icon {
            width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; flex-shrink: 0; z-index: 1;
        }
        .icon-appt { background: #e0f2fe; color: #0284c7; }
        .icon-inv { background: #fef3c7; color: #f59e0b; }
        .icon-sys { background: #f3e8ff; color: #8b5cf6; }
        .icon-fin { background: #d1fae5; color: #10b981; }

        .notif-content { flex-grow: 1; z-index: 1; }
        .notif-title { margin: 0 0 5px 0; font-size: 18px; color: #0f172a; }
        .notif-msg { margin: 0 0 10px 0; color: #475569; font-size: 15px; line-height: 1.5; }
        .notif-time { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 5px; }

        .notif-actions { display: flex; flex-direction: column; gap: 10px; justify-content: center; z-index: 1; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; color: #94a3b8; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .btn-icon:hover { background: #f1f5f9; color: #0f172a; }
        .btn-icon.delete:hover { background: #fee2e2; color: #ef4444; }

        /* 🔴 ستايل فلتر الفروع (يدعم الدارك مود) 🔴 */
        .branch-filter-select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; color: #0f172a; font-family: inherit; font-weight: bold; outline: none; cursor: pointer; height: 42px; margin-left: auto; }
        [data-theme="dark"] .branch-filter-select { background: #1e293b; border-color: #334155; color: #f8fafc; }

        /* الدارك مود */
        [data-theme="dark"] .notif-card { background: #1e293b; border-color: #334155; }
        [data-theme="dark"] .notif-card.unread { background: #2a1515; border-color: #ef4444; }
        [data-theme="dark"] .notif-title { color: #f8fafc; }
        [data-theme="dark"] .notif-msg { color: #cbd5e1; }
        [data-theme="dark"] .btn-icon:hover { background: #334155; color: #f8fafc; }
        [data-theme="dark"] .btn-icon.delete:hover { background: #451a1a; color: #ef4444; }
        [data-theme="dark"] .icon-appt { background: #0c4a6e; color: #38bdf8; }
        [data-theme="dark"] .icon-inv { background: #78350f; color: #fbbf24; }
        [data-theme="dark"] .icon-sys { background: #4c1d95; color: #a78bfa; }
        [data-theme="dark"] .icon-fin { background: #064e3b; color: #34d399; }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">
            <h1 id="txt-title">الإشعارات والتنبيهات</h1>
            <p id="txt-subtitle">متابعة أحداث العيادة والنواقص والمواعيد الجديدة</p>
        </div>
        <div class="header-actions" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; width: 100%;">
            
            <select id="branch-filter" class="branch-filter-select" style="display: none;" onchange="startNotificationsListener()">
                <option value="all" id="opt-all-branches">كل الفروع</option>
            </select>

            <button class="btn-action" style="background: #f3e8ff; color: #8b5cf6; border-color: #d8b4fe;" onclick="spawnTestNotification()">
                <span>✨ إرسال إشعار تجريبي</span>
            </button>

            <button class="btn-primary" onclick="markAllAsRead()">
                <span id="btn-read-all">✔️ تحديد الكل كمقروء</span>
            </button>
            <button class="btn-action" style="background: #fee2e2; color: #ef4444; border-color: #fecaca;" onclick="deleteAllNotifications()">
                <span id="btn-delete-all">🗑️ مسح الكل</span>
            </button>
        </div>
    </div>

    <div class="notif-container" id="notificationsContainer">
        </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
