<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/patient-profile.css">
    <link rel="icon" href="data:,"> 
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        .table-container { overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 700; }
        tr:hover { background: #f1f5f9; }
        .btn-view { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; }
        .search-box { padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-family: inherit; width: 100%; max-width: 300px; transition: border-color 0.3s; }
        .search-box:focus { border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="profile-container">
            <button class="btn-back" onclick="window.location.href='patients.html'">
                <span>🔙</span> <span id="txt-back">العودة لقائمة المرضى</span>
            </button>

            <div class="patient-header-card">
                <div class="patient-info">
                    <div class="patient-avatar">👤</div>
                    <div>
                        <h1 id="prof-name">جاري التحميل...</h1>
                        <div class="patient-meta">
                            <span id="prof-phone" dir="ltr">📞 ---</span>
                            <span id="prof-age">🎂 --- سنة</span>
                            <span id="prof-gender">🚻 ---</span>
                        </div>
                    </div>
                </div>
                <div class="patient-alerts" id="prof-alerts"></div>
            </div>

            <div class="action-bar" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h3 id="txt-sess-title" style="margin: 0;">سجل الجلسات العلاجية</h3>
                <div style="display: flex; gap: 10px; flex: 1; justify-content: flex-end; align-items: center; min-width: 300px;">
                    <input type="text" id="searchSessionInput" class="search-box" placeholder="بحث بالتاريخ، الإجراء، أو المبلغ..." onkeyup="filterPatientSessions()">
                    <button class="btn-primary" onclick="openModal('sessionModal')" id="btn-add-sess" style="white-space: nowrap;">➕ إضافة جلسة</button>
                </div>
            </div>

            <div class="table-container">
                <table id="sessionsTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الإجراء الطبي</th>
                            <th>الإجمالي</th>
                            <th>المدفوع</th>
                            <th>المتبقي</th>
                            <th>الموعد القادم</th>
                            <th style="text-align: center;">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="sessions-list">
                        <tr><td colspan="7" style="text-align: center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <div id="sessionModal" class="modal no-print">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" onclick="closeModal('sessionModal')">&times;</span>
            <h2 style="margin-top: 0;">إضافة جلسة جديدة</h2>
            <form onsubmit="saveSession(event)">
                
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>تاريخ الجلسة</label>
                        <input type="date" id="sess_date" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>الموعد القادم (اختياري)</label>
                        <input type="date" id="sess_next_date">
                    </div>
                </div>

                <div class="form-group">
                    <label>الإجراء الطبي</label>
                    <input type="text" id="sess_procedure" placeholder="مثال: حشو عصب، خلع، كشف..." required>
                </div>
                
                <div class="form-group">
                    <label>رقم السن / الضرس (اختياري)</label>
                    <input type="text" id="sess_tooth" placeholder="مثال: Upper Right 6">
                </div>
                
                <div style="display: flex; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>إجمالي الحساب (ج.م)</label>
                        <input type="number" id="sess_total" placeholder="0" min="0" required oninput="calculateRemaining()">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>المدفوع (ج.م)</label>
                        <input type="number" id="sess_paid" placeholder="0" min="0" required oninput="calculateRemaining()">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>المتبقي (ج.م)</label>
                        <input type="number" id="sess_remaining" placeholder="0" readonly style="background: #e2e8f0; font-weight: bold; color: #ef4444;">
                    </div>
                </div>

                <div class="form-group">
                    <label>ملاحظات الطبيب</label>
                    <textarea id="sess_notes" rows="3" style="width:100%; border-radius:8px; border:1px solid #cbd5e1; padding:10px; font-family:inherit;"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px; justify-content: center;" id="btn-save-session">حفظ الجلسة</button>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/patient-profile.js"></script>
</body>
</html>
