<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script>
        var currentHour = Math.floor(Date.now() / 3600000);
        document.write('<link rel="stylesheet" href="css/patient-profile.css?v=' + currentHour + '">');
    </script>
    <link rel="icon" href="data:,"> 
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        .table-container { overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 700; }
        tr:hover { background: #f1f5f9; }
        .btn-view { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; }
        .search-box { padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-family: inherit; width: 100%; transition: border-color 0.3s; }
        .search-box:focus { border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
        .btn-action { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-left: 5px;}
        .btn-action:hover { background: #e2e8f0; }
        .action-group { display: flex; gap: 5px; justify-content: center; align-items: center;}
    </style>
</head>
<body>

    <div class="no-print">
        <div class="profile-container">
            <button class="btn-back" onclick="window.location.href='patients.html'">
                <span>🔙</span> <span id="txt-back">العودة لقائمة المرضى</span>
            </button>

            <div class="patient-header-card">
                <div class="patient-info">
                    <div class="patient-avatar">👤</div>
                    <div>
                        <h1 id="prof-name">جاري التحميل...</h1>
                        <div class="patient-meta">
                            <span id="prof-phone" dir="ltr">📞 ---</span>
                            <span id="prof-age">🎂 --- سنة</span>
                            <span id="prof-gender">🚻 ---</span>
                        </div>
                    </div>
                </div>
                <div class="patient-alerts" id="prof-alerts"></div>
            </div>

            <div class="action-bar" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h3 id="txt-sess-title" style="margin: 0;">سجل الجلسات العلاجية</h3>
                
                <div style="display: flex; gap: 5px; flex: 1; justify-content: flex-end; align-items: center; min-width: 300px;">
                    <input type="text" id="searchSessionInput" class="search-box" placeholder="بحث بالتاريخ، الإجراء، أو الملاحظة..." style="max-width: 250px;">
                    <button class="btn-primary" onclick="searchSessions()" id="btn-do-search" style="padding: 10px 15px; border-radius: 8px;">🔍 بحث</button>
                    <button class="btn-danger" onclick="resetSessionSearch()" style="padding: 10px; background: #94a3b8; border: none; border-radius: 8px; color: white; cursor: pointer;" title="إعادة ضبط">🔄</button>
                    <button class="btn-primary" onclick="openModal('sessionModal')" id="btn-add-sess" style="white-space: nowrap; margin-right: 10px;">➕ إضافة جلسة</button>
                </div>
            </div>

            <div class="table-container">
                <table id="sessionsTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الإجراء الطبي</th>
                            <th>الإجمالي</th>
                            <th>المدفوع</th>
                            <th>المتبقي</th>
                            <th>الموعد القادم</th>
                            <th style="text-align: center;">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="sessions-list">
                        <tr><td colspan="7" style="text-align: center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button id="btn-load-more-sessions" class="btn-primary" onclick="loadPatientSessions(true)" style="display: none; padding: 10px 30px; border-radius: 20px; font-size: 14px; margin: 0 auto;">
                    ⬇️ تحميل المزيد من الجلسات...
                </button>
            </div>

        </div>
    </div>

    <div id="sessionModal" class="modal no-print" style="display:none; position:fixed; z-index:1000; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:25px; border-radius:12px; width:90%; max-width:600px; position:relative;">
            <span class="close-modal" onclick="closeModal('sessionModal')" style="position:absolute; top:15px; left:15px; cursor:pointer; font-size:24px;">&times;</span>
            <h2 style="margin-top: 0;">إضافة جلسة جديدة</h2>
            <form id="addSessionForm" onsubmit="saveSession(event, false)">
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">تاريخ الجلسة</label>
                        <input type="date" id="sess_date" class="search-box" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">الموعد القادم (اختياري)</label>
                        <input type="date" id="sess_next_date" class="search-box">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">الإجراء الطبي</label>
                    <input type="text" id="sess_procedure" class="search-box" style="max-width:100%;" placeholder="مثال: حشو عصب، خلع، كشف..." required>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">رقم السن / الضرس (اختياري)</label>
                    <input type="text" id="sess_tooth" class="search-box" style="max-width:100%;" placeholder="مثال: Upper Right 6">
                </div>
                
                <div style="display: flex; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">إجمالي الحساب</label>
                        <input type="number" id="sess_total" class="search-box" placeholder="0" min="0" required oninput="calculateRemaining('add')">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">المدفوع</label>
                        <input type="number" id="sess_paid" class="search-box" placeholder="0" min="0" required oninput="calculateRemaining('add')">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">المتبقي</label>
                        <input type="number" id="sess_remaining" class="search-box" placeholder="0" readonly style="background: #e2e8f0; font-weight: bold; color: #ef4444;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">ملاحظات الطبيب</label>
                    <textarea id="sess_notes" rows="3" class="search-box" style="max-width:100%; resize:vertical;"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;" id="btn-save-session">حفظ الجلسة</button>
            </form>
        </div>
    </div>

    <div id="editSessionModal" class="modal no-print" style="display:none; position:fixed; z-index:1000; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:25px; border-radius:12px; width:90%; max-width:600px; position:relative;">
            <span class="close-modal" onclick="closeModal('editSessionModal')" style="position:absolute; top:15px; left:15px; cursor:pointer; font-size:24px;">&times;</span>
            <h2 style="margin-top: 0;">تعديل بيانات الجلسة</h2>
            <form id="editSessionForm" onsubmit="saveSession(event, true)">
                <input type="hidden" id="edit_sess_id">
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">تاريخ الجلسة</label>
                        <input type="date" id="edit_sess_date" class="search-box" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">الموعد القادم</label>
                        <input type="date" id="edit_sess_next_date" class="search-box">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">الإجراء الطبي</label>
                    <input type="text" id="edit_sess_procedure" class="search-box" style="max-width:100%;" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">رقم السن / الضرس</label>
                    <input type="text" id="edit_sess_tooth" class="search-box" style="max-width:100%;">
                </div>
                
                <div style="display: flex; gap: 10px; background: #fff7ed; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fed7aa;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">إجمالي الحساب</label>
                        <input type="number" id="edit_sess_total" class="search-box" min="0" required oninput="calculateRemaining('edit')">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">المدفوع</label>
                        <input type="number" id="edit_sess_paid" class="search-box" min="0" required oninput="calculateRemaining('edit')">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label style="display:block; margin-bottom:5px;">المتبقي</label>
                        <input type="number" id="edit_sess_remaining" class="search-box" readonly style="background: #e2e8f0; font-weight: bold; color: #ef4444;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">ملاحظات الطبيب</label>
                    <textarea id="edit_sess_notes" rows="3" class="search-box" style="max-width:100%; resize:vertical;"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; background:#f59e0b;" id="btn-update-session">حفظ التعديلات</button>
            </form>
        </div>
    </div>

    <script>
        var h = Math.floor(Date.now() / 3600000); 
        document.write('<script src="js/firebase-config.js?v=' + h + '"><\/script>');
        document.write('<script src="js/patient-profile.js?v=' + h + '"><\/script>');
    </script>
</body>
</html>
