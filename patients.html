<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <script>
        var currentHour = Math.floor(Date.now() / 3600000);
        document.write('<link rel="stylesheet" href="css/patients.css?v=' + currentHour + '">');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        .med-history-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #ef4444;}
        .clickable-row { cursor: pointer; transition: background-color 0.2s ease; }
        .clickable-row:hover { background-color: #f0f9ff !important; }
        .clickable-row td { position: relative; }
        
        .btn-excel { background: #10b981; color: white; padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .btn-excel:hover { background: #059669; }

        /* 🔴 ستايل زرار الكاميرا 🔴 */
        .btn-qr { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-qr:hover { background: #e2e8f0; border-color: #94a3b8; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 2px solid #e2e8f0; }
        #reader video { border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">
            <h1 id="txt-title">إدارة المرضى</h1>
            <p id="txt-subtitle">قائمة المرضى المسجلين بالعيادة والتاريخ الطبي</p>
        </div>
        <div class="header-actions" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <div style="display: flex; gap: 5px; flex: 1; min-width: 250px;">
                <input type="text" id="searchInput" class="search-box" oninput="filterPatientsLocally()" placeholder="بحث بالاسم أو رقم الموبايل..." style="flex: 1;">
                <button class="btn-primary" onclick="searchPatients()" id="btn-do-search" style="padding: 10px 15px; border-radius: 8px;">🔍 بحث دقيق</button>
                <button class="btn-danger" onclick="resetPatientSearch()" style="padding: 10px; background: #94a3b8; border: none; border-radius: 8px; color: white; cursor: pointer;" title="إعادة ضبط">🔄</button>
            </div>
            
            <button class="btn-qr" onclick="openCameraScanner()" id="btn-scan-qr">📷 مسح كارت المريض (QR)</button>
            
            <input type="file" id="excel_upload" accept=".xlsx, .xls" style="display: none;" onchange="importPatientsFromExcel(this)">
            <button class="btn-excel" onclick="document.getElementById('excel_upload').click()">
                <span>📥</span> <span>استيراد إكسيل</span>
            </button>

            <button class="btn-add" onclick="openPatientModal()">
                <span>➕</span> <span id="btn-add-txt">إضافة مريض</span>
            </button>
        </div>
    </div>

    <div id="bulk-actions" class="bulk-actions" style="display: none;">
        <span id="txt-selected-count" style="font-weight: bold; color: #0f172a;">تم تحديد 0 مريض</span>
        <button class="btn-danger" onclick="deleteSelectedPatients()" id="btn-bulk-delete">🗑️ حذف المحدد</button>
    </div>

    <div class="table-container">
        <table id="patientsTable">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">
                        <input type="checkbox" id="selectAll" class="custom-checkbox" onclick="toggleSelectAll(this)">
                    </th>
                    <th id="th-date">التاريخ والوقت</th> <th id="th-name">اسم المريض</th>
                    <th id="th-phone">رقم الموبايل</th>
                    <th id="th-debt">المديونية</th> <th id="th-age">السن</th>
                    <th id="th-history">تنبيهات طبية</th>
                    <th id="th-notes">الملاحظات</th>
                    <th id="th-action" style="text-align: center;">إجراءات</th>
                </tr>
            </thead>
            <tbody id="patientsBody">
                <tr><td colspan="9" style="text-align: center;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
        
        <div style="text-align: center; margin-top: 20px;">
            <button id="btn-load-more" class="btn-primary" onclick="loadMorePatients()" style="display: none; padding: 10px 30px; border-radius: 20px; font-size: 14px; margin: 0 auto;">
                ⬇️ تحميل المزيد...
            </button>
        </div>
    </div>

    <div id="patientModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" onclick="closePatientModal()">&times;</span>
            <h2 id="modal-title" style="margin-top: 0; margin-bottom: 20px;">تسجيل مريض جديد</h2>
            
            <form id="addPatientForm" onsubmit="savePatient(event)">
                
                <div class="form-group" style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <label style="color: #0284c7; margin-bottom: 5px;">تاريخ تسجيل الملف (افتراضي: اليوم)</label>
                    <input type="date" id="p_date" required>
                </div>

                <div class="form-group">
                    <label id="lbl-p-name">اسم المريض بالكامل</label>
                    <input type="text" id="p_name" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label id="lbl-p-phone">رقم الموبايل</label>
                        <input type="tel" id="p_phone" required dir="ltr" style="text-align: left;">
                    </div>
                    <div class="form-group">
                        <label id="lbl-p-age">السن</label>
                        <input type="number" id="p_age" required>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lbl-p-gender">النوع</label>
                    <select id="p_gender">
                        <option value="ذكر" id="opt-male">ذكر</option>
                        <option value="أنثى" id="opt-female">أنثى</option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 15px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                    <label id="lbl-p-history" style="color: #ef4444;">التاريخ الطبي والأمراض المزمنة (إن وجد)</label>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; color: #0f172a; font-weight: 500;">
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="قلب"> قلب</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="غدة"> غدة</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="سكر"> سكر</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="ضغط"> ضغط</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; flex-direction: row-reverse;"><input type="checkbox" class="med-history-cb" value="حمل"> حمل</label>
                    </div>
                    <input type="text" id="p_history_notes" placeholder="ملاحظات طبية أخرى (اكتب هنا إن وجد)..." style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit;">
                </div>

                <div class="form-group">
                    <label id="lbl-p-notes">ملاحظات إضافية</label>
                    <input type="text" id="p_notes" placeholder="أي ملاحظات أخرى...">
                </div>

                <button type="submit" id="btn-save" class="btn-add" style="width: 100%; justify-content: center; margin-top: 20px; padding: 12px; font-size: 16px;">
                    حفظ بيانات المريض
                </button>
            </form>
        </div>
    </div>

    <div id="cameraScannerModal" class="modal">
        <div class="modal-content" style="max-width: 450px; text-align: center;">
            <span class="close-modal" onclick="closeCameraScanner()">&times;</span>
            <h2 id="cam-modal-title" style="margin-top: 0; color: #0f172a; margin-bottom: 5px;">📷 ماسح كارت المريض</h2>
            <p id="cam-modal-sub" style="color: #64748b; font-size: 14px; margin-bottom: 20px;">قم بتوجيه الكاميرا نحو الـ QR Code الخاص بالمريض</p>
            <div id="reader"></div>
        </div>
    </div>

    <script>
        var h = Math.floor(Date.now() / 3600000); 
        document.write('<script src="js/firebase-config.js?v=' + h + '"><\/script>');
        document.write('<script src="js/patients.js?v=' + h + '"><\/script>');
    </script>
</body>
</html>
