<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/settings.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="page-header">
        <div class="page-title">
            <h1 id="txt-title">إعدادات العيادة</h1>
            <p id="txt-subtitle">تخصيص بيانات العيادة والشعار (اللوجو)</p>
        </div>
    </div>

    <div class="settings-container">
        <div class="settings-card">
            <h3 id="txt-card-title" style="margin-top: 0; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 25px;">البيانات الأساسية</h3>
            
            <form id="settingsForm" onsubmit="saveSettings(event)">
                
                <div class="logo-upload-section">
                    <div class="logo-preview-container">
                        <img id="logo-preview" src="https://via.placeholder.com/100?text=Logo" alt="Clinic Logo">
                    </div>
                    <div class="logo-actions">
                        <label id="lbl-logo">شعار العيادة (اللوجو)</label>
                        <p id="lbl-logo-hint" style="color: #64748b; font-size: 13px; margin: 5px 0 10px 0;">يفضل أن تكون الصورة مربعة (1:1) بخلفية شفافة</p>
                        <input type="file" id="clinic_logo" accept="image/*" onchange="encodeLogo(this)">
                        <input type="hidden" id="logo_base64">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <label id="lbl-name">اسم العيادة / المركز الطبي</label>
                    <input type="text" id="clinic_name" placeholder="أدخل اسم العيادة الذي سيظهر في النظام والروشتات" required>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label id="lbl-lang">لغة النظام (System Language)</label>
                    <select id="app_language" onchange="changeSystemLanguage(this.value)">
                        <option value="ar">العربية (Arabic)</option>
                        <option value="en">English (الإنجليزية)</option>
                    </select>
                </div>

                <button type="submit" id="btn-save" class="btn-primary" style="margin-top: 20px; width: 100%; justify-content: center; font-size: 16px; padding: 15px;">حفظ التعديلات</button>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
